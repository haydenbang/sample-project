# ShopAdmin 로컬/배포 오케스트레이션
# 백엔드 환경 변수를 추가하면 backend.environment 와 .env.example, CI 에도 반영해야 한다.
# (변경 영향도 데모: scenario/env-var-change)

services:
  backend:
    build:
      context: ./backend
    image: shopadmin-backend:latest
    environment:
      ENVIRONMENT: production
      DATABASE_URL: sqlite:///./shopadmin.db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-prod}
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      CORS_ORIGINS: http://localhost:8080
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    image: shopadmin-frontend:latest
    depends_on:
      - backend
    ports:
      - "8080:80"
