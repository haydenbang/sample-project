server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA 라우팅: 모든 경로를 index.html 로 폴백
  location / {
    try_files $uri $uri/ /index.html;
  }

  # API 프록시 (백엔드 컨테이너로 전달)
  location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
